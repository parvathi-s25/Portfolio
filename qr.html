<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Portfolio | QR Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            padding: 2rem;
        }

        .qr-card {
            max-width: 500px;
            width: 100%;
            padding: 3rem;
            text-align: center;
        }

        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            margin: 2rem 0;
        }

        #qrcode img {
            margin: 0 auto;
        }

        .url-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            color: var(--accent-color);
            margin-bottom: 2rem;
            word-break: break-all;
        }

        .back-link {
            display: block;
            margin-top: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <div class="qr-page">
        <div class="qr-card glass reveal active">
            <h1>Share My Portfolio</h1>
            <p>Scan this QR code to view <strong>Parvathi Rajpurohit's</strong> portfolio.</p>

            <div id="qrcode"></div>

            <div class="url-display" id="url-text">https://parvathi-rajpurohit-ai.vercel.app</div>

            <div class="actions">
                <button id="download-btn" class="btn btn-primary">
                    <i class="fas fa-download"></i> Download PNG
                </button>
            </div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const portfolioUrl = "https://parvathi-rajpurohit-ai.vercel.app";

        // Generate QR Code
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: portfolioUrl,
            width: 256,
            height: 256,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Download QR Code as PNG
        document.getElementById('download-btn').addEventListener('click', function () {
            const qrImage = document.querySelector('#qrcode img');
            if (qrImage) {
                const link = document.createElement('a');
                link.download = 'parvathi-portfolio-qr.png';
                link.href = qrImage.src;
                link.click();
            } else {
                // If the library used canvas instead of img
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = 'parvathi-portfolio-qr.png';
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                }
            }
        });
    </script>
</body>

</html>
